<!DOCTYPE html>
 <html>
 <head>
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>POS Fixed</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
 body{margin:0;font-family:system-ui;background:#f1f5f9}

header{
 padding:12px;
 background:white;
 display:flex;
 justify-content:space-between;
 font-weight:bold;
 box-shadow:0 2px 5px rgba(0,0,0,0.1);
 }

#scanner{
 height:220px;
 background:black;
 overflow:hidden;
 }

#scanner video{
 width:100%!important;
 height:100%!important;
 object-fit:cover;
 }

.cart{
 background:white;
 border-radius:20px 20px 0 0;
 margin-top:-20px;
 padding:15px;
 min-height:55vh;
 }

.item{
 background:#f8fafc;
 padding:10px;
 margin:8px 0;
 border-radius:10px;
 }

.qty{
 display:flex;
 gap:10px;
 margin-top:5px;
 }

.checkoutBar{
 position:fixed;
 bottom:0;
 width:100%;
 background:white;
 padding:10px;
 display:flex;
 justify-content:space-between;
 box-shadow:0 -2px 5px rgba(0,0,0,0.1);
 }

button{padding:8px 12px}

/* MODAL */
 .modal{
 position:fixed;
 inset:0;
 display:none;
 background:rgba(0,0,0,0.5);
 justify-content:flex-end;
 }

.sheet{
 background:white;
 width:100%;
 padding:20px;
 border-radius:20px 20px 0 0;
 }

/* CHECKOUT SCREEN */
 #checkoutPage{
 display:none;
 padding:15px;
 }

.bill{
 background:white;
 padding:15px;
 border-radius:10px;
 }
 </style>
 </head>

<body>

<header>
 POS System
 <button onclick="resetCart()">Reset</button>
 </header>

<div id="scanner"></div>

<!-- MAIN SCREEN -->
 <div id="mainScreen">
 <div class="cart">
 <div id="cartItems"></div>
 </div>

 <div class="checkoutBar">
 <span id="total">₹0</span>
 <button onclick="openCheckout()">Checkout</button>
 </div>
 </div>

<!-- CHECKOUT SCREEN -->
 <div id="checkoutPage">
 <h2>Checkout</h2>
 <div id="bill"></div>

 <br>
 <button onclick="goBack()">⬅ Back</button>
 </div>

<!-- MODAL -->
 <div id="modal" class="modal">
 <div class="sheet">
 <h3>Add Product</h3>
 <input id="name" placeholder="Name"><br><br>
 <input id="price" type="number" placeholder="Price"><br><br>
 <select id="gst">
 <option value="0">Food (0%)</option>
 <option value="5">5%</option>
 <option value="18">18%</option>
 <option value="40">40%</option>
 </select><br><br>
 <button onclick="saveProduct()">Save</button>
 </div>
 </div>

<script>
 let cart = JSON.parse(localStorage.getItem("cart") || "[]");
 let products = JSON.parse(localStorage.getItem("products") || "{}");

let scanner;
 let lastScan = 0;
 let scannedCode = null;

const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

window.onload = () => {
 render();
 startScanner();
 };

/* SCANNER */
 async function startScanner(){
 scanner = new Html5Qrcode("scanner");

 await scanner.start(
 { facingMode:"environment" },
 { fps:10, qrbox:200 },
 code => {

 if(Date.now()-lastScan < 1000) return;
 lastScan = Date.now();

 beep.play();

 if(products[code]){
 addToCart(products[code]);
 } else {
 scannedCode = code;
 modal.style.display="flex";
 }
 }
 );
 }

/* CART */
 function addToCart(p){
 let i = cart.find(x=>x.code===p.code);
 if(i) i.qty++;
 else cart.push({...p,qty:1});

 save();
 render();
 }

function changeQty(code,d){
 let i = cart.find(x=>x.code===code);
 if(!i) return;

 i.qty += d;
 if(i.qty<=0) cart = cart.filter(x=>x.code!==code);

 save();
 render();
 }

/* RENDER */
 function render(){
 let html="";
 let total=0;

 cart.forEach(i=>{
 total += i.price*i.qty;

 html += `
 <div class="item">
 ${i.name}<br>
 ₹${i.price*i.qty}

 <div class="qty">
 <button onclick="changeQty('${i.code}',-1)">-</button>
 ${i.qty}
 <button onclick="changeQty('${i.code}',1)">+</button>
 </div>
 </div>
 `;
 });

 cartItems.innerHTML = html;
 totalDiv.innerText = "₹"+total;
 }

function save(){
 localStorage.setItem("cart",JSON.stringify(cart));
 localStorage.setItem("products",JSON.stringify(products));
 }

/* RESET */
 function resetCart(){
 cart=[];
 save();
 render();
 }

/* CHECKOUT FIXED */
 function openCheckout(){

 document.getElementById("mainScreen").style.display="none";
 document.getElementById("checkoutPage").style.display="block";

 let total=0;
 let html="";

 cart.forEach(i=>{
 total += i.price*i.qty;

 html += `
 <div>
 ${i.name} x ${i.qty} = ₹${i.price*i.qty}
 </div>
 `;
 });

 bill.innerHTML = `
 ${html}
 <hr>
 <b>Total: ₹${total}</b>
 `;
 }

/* BACK FIXED */
 function goBack(){
 document.getElementById("checkoutPage").style.display="none";
 document.getElementById("mainScreen").style.display="block";
 }

/* ADD PRODUCT */
 function saveProduct(){

 const nameVal = document.getElementById("name").value.trim();
 const priceVal = Number(document.getElementById("price").value);
 const gstVal = Number(document.getElementById("gst").value);

 if(!nameVal || isNaN(priceVal)) return;

 products[scannedCode] = {
 code: scannedCode,
 name: nameVal,
 price: priceVal,
 gst: gstVal
 };

 save();

 modal.style.display="none";

 addToCart(products[scannedCode]);
 }

/* ELEMENTS */
 const cartItems=document.getElementById("cartItems");
 const totalDiv=document.getElementById("total");
 const modal=document.getElementById("modal");
 const bill=document.getElementById("bill");
 </script>

</body>
 </html>
