<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Business POS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#f1f5f9;
}

header {
  padding:12px;
  background:white;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

#scanner {
  height:220px;
  background:black;
  overflow:hidden;
}

#scanner video {
  width:100%!important;
  height:100%!important;
  object-fit:cover;
}

.cart {
  background:white;
  border-radius:20px 20px 0 0;
  margin-top:-20px;
  padding:15px;
  min-height:50vh;
}

.item {
  background:#f8fafc;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
}

.qty {
  display:flex;
  gap:10px;
}

.checkout {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.modal {
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,0.5);
  justify-content:flex-end;
}

.sheet {
  background:white;
  width:100%;
  padding:20px;
  border-radius:20px 20px 0 0;
}

button {
  padding:8px 12px;
}
</style>
</head>

<body>

<header>
  <span>POS System</span>
  <div>
    <button onclick="exportCSV()">Export</button>
    <input type="file" onchange="importCSV(event)">
    <button onclick="resetAll()">Reset</button>
  </div>
</header>

<div id="scanner"></div>

<div class="cart">
  <div id="cartItems"></div>
</div>

<div class="checkout">
  <span id="total">₹0</span>
  <button onclick="openCheckout()">Checkout</button>
</div>

<!-- ADD PRODUCT MODAL -->
<div id="modal" class="modal">
  <div class="sheet">
    <h3>Add Product</h3>

    <input id="name" placeholder="Product Name"><br><br>
    <input id="price" type="number" placeholder="Price (GST incl)"><br><br>

    <select id="gst">
      <option value="0">Food / Medicine (0%)</option>
      <option value="5">Common Items (5%)</option>
      <option value="18">Electronics (18%)</option>
      <option value="40">Luxury (40%)</option>
    </select><br><br>

    <button onclick="saveProduct()">Save Product</button>
  </div>
</div>

<!-- CHECKOUT -->
<div id="checkoutPage" style="display:none;padding:15px;">
  <h2>Invoice</h2>
  <div id="bill"></div>

  <button onclick="goBack()">Back</button>
</div>

<script>
/* CLEAN DB RESET */
let cart = JSON.parse(localStorage.getItem("cart") || "[]");
let products = JSON.parse(localStorage.getItem("products") || "{}");

let scanner;
let lastScan = 0;
let scannedCode = null;

/* INIT */
window.onload = () => {
  render();
  startScanner();
};

/* SCANNER */
async function startScanner(){
  scanner = new Html5Qrcode("scanner");

  await scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:200 },
    code => {

      if(Date.now() - lastScan < 1000) return;
      lastScan = Date.now();

      if(products[code]){
        addToCart(products[code]);
      } else {
        scannedCode = code;
        modal.style.display = "flex";
      }
    }
  );
}

/* CART */
function addToCart(p){
  let i = cart.find(x=>x.code===p.code);

  if(i) i.qty++;
  else cart.push({...p, qty:1});

  save();
  render();
}

function changeQty(code,d){
  let i = cart.find(x=>x.code===code);
  if(!i) return;

  i.qty += d;
  if(i.qty<=0) cart = cart.filter(x=>x.code!==code);

  save();
  render();
}

/* RENDER */
function render(){
  let html="";
  let total=0;

  cart.forEach(i=>{
    total += i.price*i.qty;

    html += `
      <div class="item">
        <b>${i.name}</b><br>
        ₹${i.price*i.qty}

        <div class="qty">
          <button onclick="changeQty('${i.code}',-1)">-</button>
          ${i.qty}
          <button onclick="changeQty('${i.code}',1)">+</button>
        </div>
      </div>
    `;
  });

  cartItems.innerHTML = html;
  totalDiv.innerText = "₹"+total;
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  localStorage.setItem("products", JSON.stringify(products));
}

/* SAVE PRODUCT FIXED */
function saveProduct(){

  const nameVal = document.getElementById("name").value.trim();
  const priceVal = Number(document.getElementById("price").value);
  const gstVal = Number(document.getElementById("gst").value);

  if(!nameVal || isNaN(priceVal)){
    alert("Invalid product");
    return;
  }

  const p = {
    code: scannedCode,
    name: nameVal,
    price: priceVal,
    gst: gstVal
  };

  products[scannedCode] = p;
  save();

  modal.style.display = "none"; // ✅ FIXED CLOSE

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";

  addToCart(p);
}

/* EXPORT CSV */
function exportCSV(){
  let csv = "code,name,price,gst\n";

  Object.values(products).forEach(p=>{
    csv += `${p.code},${p.name},${p.price},${p.gst}\n`;
  });

  const blob = new Blob([csv], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "products.csv";
  a.click();
}

/* IMPORT CSV */
function importCSV(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    const rows = reader.result.split("\n").slice(1);

    rows.forEach(r=>{
      if(!r) return;
      const [code,name,price,gst] = r.split(",");

      products[code] = {
        code,
        name,
        price: Number(price),
        gst: Number(gst)
      };
    });

    save();
    alert("Imported!");
  };

  reader.readAsText(file);
}

/* RESET */
function resetAll(){
  if(confirm("Clear everything?")){
    cart = [];
    products = {};
    save();
    render();
  }
}

/* CHECKOUT */
function openCheckout(){
  let total=0;
  let gstTotal=0;
  let html="";

  cart.forEach(i=>{
    const price = i.price*i.qty;
    const base = price / (1 + i.gst/100);
    const gst = price - base;

    total += price;
    gstTotal += gst;

    html += `
      <div>
        ${i.name} x ${i.qty} = ₹${price.toFixed(2)}<br>
        GST ${i.gst}% = ₹${gst.toFixed(2)}
      </div><br>
    `;
  });

  bill.innerHTML = `
    ${html}
    <hr>
    <b>Total: ₹${total.toFixed(2)}</b><br>
    <b>GST: ₹${gstTotal.toFixed(2)}</b>
  `;
}

/* BACK */
function goBack(){
  document.getElementById("checkoutPage").style.display="none";
}

/* ELEMENTS */
const cartItems=document.getElementById("cartItems");
const totalDiv=document.getElementById("total");
const modal=document.getElementById("modal");
</script>

</body>
</html>
